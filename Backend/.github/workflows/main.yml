name: Trace Sure ci/cd  pipeline

on: 
   push:  
     branches:
       -main

jobs: 
 deploy:
     name: build and deploy trace sure 
     runs-on: ubuntu-latest
     steps:
       - name : checkout code
         uses: actions/checkout@v4

       - name: setup Node.js 22
         uses: actions/setup-node@v4
         with: 
           node-version: 22

       - name: install dependencies
         run: npm install

       - name : check syntax
         run: node --check server.js
            
